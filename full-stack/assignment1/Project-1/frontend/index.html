<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pikachu</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <div class="content">
            <img class="logo" src="./public/pokemonlogo.png"alt="pokemon logo">

            <div class="small-title">
                POKEMON GEN I
            </div>

            <h1>Pikachu</h1>
            <p class="description">
                Pikachu is an Electric-type Pokémon introduced in
                Generation I. Pikachu are small, chubby,
                and incredibly cute mouse-like Pokémon.
                They are almost completely covered by
                yellow fur.
            </p>

            <div class="counter">
                <div class="line"></div>
                <span>01 / 08</span>
            </div>

        </div>

        <img class="pikachu" src="./public/pikachu.png" alt="pikachu">

        <div class="dots">
            <div class="dot active"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>

        <div class="pokeball">
            <div class="left-line"></div>
            <div class="right-line"></div>
        </div>
    </div>
</body>

</html>
