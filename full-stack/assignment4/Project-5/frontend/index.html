<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gamer Studio</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;800;900&display=swap"
        rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
</head>

<body>

    <div class="container">

        <aside class="sidebar">

            <div class="sidebar-item">
                <i class="ri-user-3-line"></i>
                <span>About Me</span>
            </div>

            <div class="sidebar-item">
                <span>Gamers</span>
            </div>

            <div class="sidebar-item">
                <span>Research</span>
            </div>

            <div class="sidebar-item">
                <span>Gamer Studio</span>
            </div>

            <div class="sidebar-item">
                <span>Podcast</span>
            </div>

        </aside>

        <section class="profile-card">

            <div class="circle"></div>

            <img src="https://images.unsplash.com/photo-1586461715699-1e192dcd04c6?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MTV8fGFuaW1lJTIwaW1hZ2UlMjBmb3IlMjBwcm9maWxlfGVufDB8fDB8fHww"
                class="profile-img" alt="profile">

            <div class="profile-content">

                <h1>
                    Im,<br>
                    Unknown<br>
                </h1>

                <div class="profile-bottom">

                    <p>
                        inquiry@unknown.game
                        <i class="ri-mail-line"></i>
                    </p>

                    <div class="badge">
                        <span>DESIGN</span>
                    </div>

                </div>

            </div>

        </section>

        <main class="right-content">

            <div class="heading-row">

                <h2>
                    Gamer Studio
                </h2>

                <span class="corner">
                    ⌝
                </span>

            </div>

            <div class="top-grid">

                <div class="video-card">

                    <img src="https://plus.unsplash.com/premium_photo-1695937800193-9cebf5429569?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MTN8fGdob3N0JTIwdmlkZW98ZW58MHx8MHx8fDA%3D"
                        alt="workspace">

                    <div class="play-btn">
                        <i class="ri-play-fill"></i>
                    </div>

                </div>

                <div class="stats-column">

                    <div class="stat mint">

                        <span class="small-corner">
                            ⌝
                        </span>

                        <h3>51</h3>

                        <p>Games</p>

                    </div>

                    <div class="stat purple">

                        <span class="small-corner">
                            ⌝
                        </span>

                        <h3>150</h3>

                        <p>Awards</p>

                    </div>

                </div>

            </div>

            <div class="bottom-grid">

                <div class="gamer-card">

                    <img src="../public/nvidia.png" alt="">

                    <p>
                        Gamers
                    </p>

                </div>

                <div class="orb-card">

                    <img src="https://images.unsplash.com/photo-1612287230202-1ff1d85d1bdf?q=80&w=1171&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
                        alt="orb">

                </div>

                <div class="award-card">

                    <span class="small-corner dark">
                        ⌝
                    </span>

                    <h3>111</h3>

                    <p>
                        Global Game Awards.
                    </p>
                </div>
            </div>
        </main>
    </div>
</body>

</html>
